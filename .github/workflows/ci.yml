name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Archive, security, UI, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Archive validation
        run: npm run archive:validate

      - name: Security baseline
        run: npm run security:check

      - name: Interface continuity audit
        run: npm run ui:audit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
