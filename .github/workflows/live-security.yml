name: Live Security Headers

on:
  workflow_dispatch:
  schedule:
    # Daily 08:30 Zurich during standard time / 09:30 during summer time.
    - cron: '30 7 * * *'

permissions:
  contents: read

jobs:
  live-security:
    name: Check production security headers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live headers
        run: npm run security:headers
