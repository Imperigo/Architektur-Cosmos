name: KosmoOrbit CI

on:
  push:
    branches: ['claude/kosmo-orbit-v1-build-pzxkbj']
    paths: ['kosmo-orbit/**', '.github/workflows/kosmo-orbit-ci.yml']
  workflow_dispatch:

concurrency:
  group: kosmo-orbit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kosmo-orbit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kosmo-orbit/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Secret-Scan (Quelltext + dist/) — hartes Gate, Serie I / B2
        run: npm run security:secrets
      - name: Secret-Scan-Selbsttest (beweist: Fund bei Test-Key, grün bei sauberem dist/)
        run: npm run test:secret-scan
      - name: npm audit (Warngate, kein harter Bruch — Owner entscheidet später über Verschärfung)
        run: npm audit --audit-level=high || true
      - name: Upload Web-Build (PWA)
        uses: actions/upload-artifact@v4
        with:
          name: kosmo-orbit-web
          path: kosmo-orbit/apps/kosmo-orbit/dist
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kosmo-orbit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kosmo-orbit/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # Helferserver für die E2E: Fake-Render-Bridge (:8600) + Yjs-Sync (:8700).
      # Ohne sie überspringen sich die sync-abhängigen Tests ehrlich; MIT ihnen
      # läuft die volle Kette (Render aufs Blatt, Pairing, Zwei-Client-Sync).
      - name: Python-Bridge (fake-worker) starten
        run: |
          python3 -m pip install --quiet fastapi uvicorn python-multipart httpx
          nohup python3 tools/homestation-bridge/kosmo_bridge/main.py --fake-worker --port 8600 > /tmp/bridge.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8600/health && break || sleep 1; done
      - name: Sync-Server starten
        working-directory: kosmo-orbit/tools/sync-server
        run: |
          npm install --silent
          nohup node src/server.mjs > /tmp/sync.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8700/raeume && break || sleep 1; done
      - run: npx playwright test
      - name: KosmoDoc-Berichte (Screenshots) hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kosmo-orbit-e2e
          path: kosmo-orbit/e2e-results
          retention-days: 14
