name: KosmoOrbit Web (GitHub Pages)

# Interaktives Testen im Browser — v.a. auf Handy/iPad (Owner-Wunsch + Freigabe
# 10.07.2026): die echte App als Web-Link statt Installer/PDF; PWA-fähig.
# Lauf 1 scheiterte am Environment-Schutz des actions/deploy-pages-Wegs
# (Deploys nur vom Default-Branch) → Route über einen gh-pages-Branch:
# der Build wird von der CI auf `gh-pages` gepusht, Pages serviert den Branch.
# Die Aktivierung wird per REST versucht (idempotent, tolerant); falls die
# Token-Rechte nicht reichen, meldet der letzte Schritt ehrlich den EINEN
# nötigen Settings-Klick (Settings → Pages → Source: gh-pages).
# Build-Anforderung: kosmo-orbit/.pages-build-request ändern und pushen.
on:
  workflow_dispatch:
  push:
    branches: ['claude/kosmo-orbit-v1-build-pzxkbj']
    paths: ['kosmo-orbit/.pages-build-request']

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kosmo-orbit/package-lock.json
      - name: Abhängigkeiten
        working-directory: kosmo-orbit
        run: npm ci
      - name: Web-Build (cloud-Edition — Browser hat keine HomeStation)
        working-directory: kosmo-orbit
        env:
          VITE_KOSMO_EDITION: cloud
        run: npm run build -w @kosmo/orbit-app
      - name: Jekyll aus (Unterstriche in Asset-Namen schützen)
        run: touch kosmo-orbit/apps/kosmo-orbit/dist/.nojekyll
      - name: Auf gh-pages veröffentlichen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: kosmo-orbit/apps/kosmo-orbit/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'KosmoOrbit Web-Build (Pages)'
      - name: Pages aktivieren (Versuch, idempotent)
        continue-on-error: true
        run: |
          curl -sS -o /tmp/pages.json -w '%{http_code}\n' \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' || true
          cat /tmp/pages.json || true
      - name: Pages-Status melden (ehrlich)
        run: |
          code=$(curl -sS -o /tmp/pages-get.json -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages)
          echo "GET /pages → $code"
          cat /tmp/pages-get.json || true
          if [ "$code" != "200" ]; then
            echo '::warning::Pages ist noch nicht aktiviert. Ein Klick nötig: Settings → Pages → Source: Deploy from a branch → gh-pages / (root).'
          fi
