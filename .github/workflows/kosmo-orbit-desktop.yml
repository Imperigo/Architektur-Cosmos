name: KosmoOrbit Desktop-Builds

on:
  workflow_dispatch:
  push:
    tags: ['kosmo-orbit-v*']
    # Tag-Push und workflow_dispatch sind aus der Cloud-Session nicht möglich
    # (Proxy erlaubt nur den Arbeitsbranch; dispatch braucht die Datei auf main).
    # Build-Anforderung: kosmo-orbit/.desktop-build-request ändern und pushen.
    branches: ['claude/kosmo-orbit-v1-build-pzxkbj']
    paths: ['kosmo-orbit/.desktop-build-request']

jobs:
  build:
    strategy:
      fail-fast: false
      # Drei Editionen (Owner «drei Versionen») × drei Plattformen. Die Edition
      # backt nur die Erststart-Betriebsart ein (VITE_KOSMO_EDITION) — das
      # Binary bleibt sonst identisch, die Betriebsart ist jederzeit umstellbar.
      matrix:
        edition: [standard, remote, cloud]
        platform: [macos-latest, ubuntu-22.04, windows-latest]
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: kosmo-orbit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kosmo-orbit/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Linux-Abhängigkeiten
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Icon-Satz generieren
        # Pfad relativ zum App-Verzeichnis — die tauri-CLI wechselt in den
        # Projektordner, bevor sie relative Argumente auflöst
        run: npx tauri icon public/icons/icon-512.png
        working-directory: kosmo-orbit/apps/kosmo-orbit
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Erststart-Betriebsart in den Build backen (Standard/Remote/Cloud).
          VITE_KOSMO_EDITION: ${{ matrix.edition }}
        with:
          projectPath: kosmo-orbit/apps/kosmo-orbit
          args: ${{ matrix.args }}
      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: kosmo-orbit-${{ matrix.edition }}-${{ matrix.platform }}
          path: |
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.dmg
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.app.tar.gz
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.AppImage
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.deb
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.rpm
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.msi
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.exe
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.msi
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.exe
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.AppImage
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.deb
          retention-days: 30
