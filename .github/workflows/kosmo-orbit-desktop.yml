name: KosmoOrbit Desktop-Builds

on:
  workflow_dispatch:
  push:
    tags: ['kosmo-orbit-v*']
    # Tag-Push und workflow_dispatch sind aus der Cloud-Session nicht möglich
    # (Proxy erlaubt nur den Arbeitsbranch; dispatch braucht die Datei auf main).
    # Build-Anforderung: kosmo-orbit/.desktop-build-request ändern und pushen.
    branches: ['claude/kosmo-orbit-v1-build-pzxkbj']
    paths: ['kosmo-orbit/.desktop-build-request']

# Für die Release-Veröffentlichung (saubere Ein-Klick-Download-Links).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # Drei Editionen (Owner «drei Versionen») × drei Plattformen. Die Edition
      # backt nur die Erststart-Betriebsart ein (VITE_KOSMO_EDITION) — das
      # Binary bleibt sonst identisch, die Betriebsart ist jederzeit umstellbar.
      matrix:
        edition: [standard, remote, cloud]
        platform: [macos-latest, ubuntu-22.04, windows-latest]
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: kosmo-orbit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kosmo-orbit/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Linux-Abhängigkeiten
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - name: Icon-Satz generieren
        # Pfad relativ zum App-Verzeichnis — die tauri-CLI wechselt in den
        # Projektordner, bevor sie relative Argumente auflöst
        run: npx tauri icon public/icons/icon-512.png
        working-directory: kosmo-orbit/apps/kosmo-orbit
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Erststart-Betriebsart in den Build backen (Standard/Remote/Cloud).
          VITE_KOSMO_EDITION: ${{ matrix.edition }}
        with:
          projectPath: kosmo-orbit/apps/kosmo-orbit
          args: ${{ matrix.args }}
      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: kosmo-orbit-${{ matrix.edition }}-${{ matrix.platform }}
          path: |
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.dmg
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.app.tar.gz
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.AppImage
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.deb
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.rpm
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.msi
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/**/release/bundle/**/*.exe
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.msi
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.exe
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.AppImage
            kosmo-orbit/apps/kosmo-orbit/src-tauri/target/release/bundle/**/*.deb
          retention-days: 30

      # ── Release: die Installer als saubere Ein-Klick-Dateien anhängen ──
      # Stabile Namen (ohne Version) → dauerhafte Links, immer der neueste Build.
      - name: Installer für Release sammeln
        shell: bash
        run: |
          set -e
          mkdir -p dist-release
          E="${{ matrix.edition }}"
          # find statt shopt globstar: macOS-Runner haben Bash 3.2, das
          # `shopt -s globstar` nicht kennt (bricht unter `set -e` ab) — find
          # ist auf allen drei Runner-OS portabel.
          while IFS= read -r f; do
            case "$f" in
              *.exe) cp "$f" "dist-release/KosmoOrbit-$E-windows-setup.exe" ;;
              *.msi) cp "$f" "dist-release/KosmoOrbit-$E-windows.msi" ;;
              *.dmg) cp "$f" "dist-release/KosmoOrbit-$E-macos.dmg" ;;
              *.AppImage) cp "$f" "dist-release/KosmoOrbit-$E-linux.AppImage" ;;
              *.deb) cp "$f" "dist-release/KosmoOrbit-$E-linux.deb" ;;
              *.rpm) cp "$f" "dist-release/KosmoOrbit-$E-linux.rpm" ;;
            esac
          done < <(find apps/kosmo-orbit/src-tauri/target -type f -path '*/release/bundle/*' 2>/dev/null || true)
          ls -la dist-release/
      - name: Als Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: KosmoOrbit — Desktop-Installer (neuester Build)
          body: |
            Automatisch gebaut aus dem Entwicklungsbranch. Drei Editionen je
            Plattform: **standard** (HomePC) · **remote** (VPN) · **cloud** (Claude).
            Unsigniert — SmartScreen (Windows) bzw. Gatekeeper (macOS) einmal
            bestätigen. Cloud-Edition startet direkt im Claude-Modus (Opus 4.8),
            Schlüssel in Kosmo ⚙ eintragen.
          files: kosmo-orbit/dist-release/*
