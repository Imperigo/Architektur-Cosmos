<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1587 1123" font-family="Helvetica, Arial, sans-serif"><rect x="0" y="0" width="1587" height="1123" fill="#ffffff"/><text x="40" y="54" font-size="26" font-weight="bold" fill="#111111">Grundlagenstudie — Unbenannt</text><text x="40" y="78" font-size="12.5" fill="#444444">aus Zonenregel «W4 (Zürich-Altstetten)» · AZ 1.4 · max. Höhe 16 m · Grenzabstand 4/6 m · 8.7.2026</text><text x="40" y="96" font-size="12.5" fill="#444444">Ziel-GF: 1’344 m² (aus Zonenregel)</text><line x1="40" y1="108" x2="1547" y2="108" stroke="#bbbbbb" stroke-width="1"/><rect x="40" y="118" width="1507" height="94" fill="#f6f2e6" stroke="#c9bfa0" stroke-width="1"/><text x="54" y="134" font-size="10.5" letter-spacing="1" fill="#8a7a4e">EMPFEHLUNG</text><text x="54" y="156" font-size="18" font-weight="bold" fill="#111111">Empfehlung: Riegel.</text><text x="54" y="176" font-size="12.5" fill="#333333">Sie erfüllt das Programm zu 224.8 % und hält die Höhe mit 7.6 m Reserve ein.</text><text x="54" y="192" font-size="12.5" fill="#333333">Mit 53.3 % Freifläche bei 46.7 % Überbauung bleibt die Parzelle vergleichsweise offen.</text><text x="54" y="208" font-size="12.5" fill="#333333">Im Ranking liegt sie mit einem Score von 73.7 vor «Turm» (60).</text><rect x="40.00" y="228" width="493.00" height="220" fill="none" stroke="#cccccc" stroke-width="1"/><text x="50.00" y="242" font-size="13" font-weight="bold" fill="#111111">Teppich</text><polygon points="211.50,376.00 361.50,376.00 361.50,286.00 211.50,286.00" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="3,2"/><polygon points="346.50,361.00 346.50,301.00 226.50,301.00 226.50,361.00" fill="#e4e4e4" stroke="#333333" stroke-width="1"/><text x="50.00" y="420.00" font-size="11" fill="#333333">Freifläche 46.7 %</text><text x="50.00" y="434.00" font-size="11" fill="#333333">3 Geschosse · 8.4 m</text><rect x="547.00" y="228" width="493.00" height="220" fill="none" stroke="#cccccc" stroke-width="1"/><text x="557.00" y="242" font-size="13" font-weight="bold" fill="#111111">Riegel</text><polygon points="718.50,376.00 868.50,376.00 868.50,286.00 718.50,286.00" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="3,2"/><polygon points="733.50,357.25 853.50,357.25 853.50,304.75 733.50,304.75" fill="#e4e4e4" stroke="#333333" stroke-width="1"/><text x="557.00" y="420.00" font-size="11" fill="#333333">Freifläche 53.3 %</text><text x="557.00" y="434.00" font-size="11" fill="#333333">3 Geschosse · 8.4 m</text><rect x="1054.00" y="228" width="493.00" height="220" fill="none" stroke="#cccccc" stroke-width="1"/><text x="1064.00" y="242" font-size="13" font-weight="bold" fill="#111111">Turm</text><polygon points="1225.50,376.00 1375.50,376.00 1375.50,286.00 1225.50,286.00" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="3,2"/><polygon points="1270.50,361.00 1330.50,361.00 1330.50,301.00 1270.50,301.00" fill="#e4e4e4" stroke="#333333" stroke-width="1"/><text x="1064.00" y="420.00" font-size="11" fill="#333333">Freifläche 73.3 %</text><text x="1064.00" y="434.00" font-size="11" fill="#333333">5 Geschosse · 14 m</text><rect x="40" y="468" width="1507" height="136" fill="none" stroke="#999999" stroke-width="1"/><text x="466.17" y="485" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#111111">Teppich</text><text x="898.50" y="485" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#111111">Riegel</text><text x="1330.83" y="485" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#111111">Turm</text><line x1="40" y1="494" x2="1547" y2="494" stroke="#999999" stroke-width="1"/><text x="46" y="509.00" font-size="11" fill="#333333">Geschosse</text><text x="466.17" y="509.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">3</text><text x="898.50" y="509.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">3</text><text x="1330.83" y="509.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">5</text><line x1="40" y1="516.00" x2="1547" y2="516.00" stroke="#e2e2e2" stroke-width="1"/><text x="46" y="531.00" font-size="11" fill="#333333">Höhe / Reserve zur Regel</text><rect x="250.00" y="516.00" width="432.33" height="22" fill="#eef3e6"/><text x="466.17" y="531.00" font-size="11" text-anchor="middle" font-weight="bold" fill="#222222">8.4 m (+7.6 m)</text><text x="898.50" y="531.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">8.4 m (+7.6 m)</text><text x="1330.83" y="531.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">14 m (+2 m)</text><line x1="40" y1="538.00" x2="1547" y2="538.00" stroke="#e2e2e2" stroke-width="1"/><text x="46" y="553.00" font-size="11" fill="#333333">GF / Programm-Erfüllung</text><text x="466.17" y="553.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">1’536 m² (256.9 %)</text><text x="898.50" y="553.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">1’344 m² (224.8 %)</text><rect x="1114.67" y="538.00" width="432.33" height="22" fill="#eef3e6"/><text x="1330.83" y="553.00" font-size="11" text-anchor="middle" font-weight="bold" fill="#222222">1’280 m² (214.1 %)</text><line x1="40" y1="560.00" x2="1547" y2="560.00" stroke="#e2e2e2" stroke-width="1"/><text x="46" y="575.00" font-size="11" fill="#333333">Überbauungsgrad / Freifläche</text><text x="466.17" y="575.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">53.3 % / 46.7 %</text><text x="898.50" y="575.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">46.7 % / 53.3 %</text><rect x="1114.67" y="560.00" width="432.33" height="22" fill="#eef3e6"/><text x="1330.83" y="575.00" font-size="11" text-anchor="middle" font-weight="bold" fill="#222222">26.7 % / 73.3 %</text><line x1="40" y1="582.00" x2="1547" y2="582.00" stroke="#e2e2e2" stroke-width="1"/><text x="46" y="597.00" font-size="11" fill="#333333">Grenzabstand-Besonnung (3h-Näherung)</text><text x="466.17" y="597.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">—</text><text x="898.50" y="597.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">—</text><text x="1330.83" y="597.00" font-size="11" text-anchor="middle" font-weight="normal" fill="#222222">—</text><rect x="40.00" y="624" width="493.00" height="250" fill="none" stroke="#cccccc" stroke-width="1"/><text x="50.00" y="644.00" font-size="10.8" fill="#222222">Teppich: flächendeckende, niedrige Bebauung ohne Adressbildung — der</text><text x="50.00" y="657.00" font-size="10.8" fill="#222222">«Mat-Building»-Ansatz der Teppichsiedlung — 3 Geschosse, 8.4 m Höhe, 1’536 m² GF.</text><text x="50.00" y="673.00" font-size="10.8" fill="#222222">Der Freiraum verteilt sich in vielen kleinen Zwischenräumen statt in einem grossen</text><text x="50.00" y="686.00" font-size="10.8" fill="#222222">Aussenraum (46.7 % Freifläche bei 53.3 % Überbauung).</text><text x="50.00" y="702.00" font-size="10.8" fill="#222222">Kurze, ebenerdige Wege zu jeder Einheit, aber viele parallele Zugänge statt eines</text><text x="50.00" y="715.00" font-size="10.8" fill="#222222">Rückgrats.</text><text x="50.00" y="731.00" font-size="10.8" fill="#222222">Übererfüllt das Programm um 156.9 Prozentpunkte.</text><rect x="547.00" y="624" width="493.00" height="250" fill="none" stroke="#cccccc" stroke-width="1"/><text x="557.00" y="644.00" font-size="10.8" fill="#222222">Riegel: ein langgestreckter Baukörper entlang einer Achse — klassischer</text><text x="557.00" y="657.00" font-size="10.8" fill="#222222">Zeilenbau/Riegel mit klarer Adresse — 3 Geschosse, 8.4 m Höhe, 1’344 m² GF.</text><text x="557.00" y="673.00" font-size="10.8" fill="#222222">Der Freiraum bleibt als ein grosses, zusammenhängendes Vorfeld erhalten statt in</text><text x="557.00" y="686.00" font-size="10.8" fill="#222222">Restflächen zu zerfallen (53.3 % Freifläche bei 46.7 % Überbauung).</text><text x="557.00" y="702.00" font-size="10.8" fill="#222222">Ein durchgehendes Treppenhaus-/Laubengang-Rückgrat erschliesst alle Geschosse</text><text x="557.00" y="715.00" font-size="10.8" fill="#222222">geradlinig.</text><text x="557.00" y="731.00" font-size="10.8" fill="#222222">Übererfüllt das Programm um 124.8 Prozentpunkte.</text><rect x="1054.00" y="624" width="493.00" height="250" fill="none" stroke="#cccccc" stroke-width="1"/><text x="1064.00" y="644.00" font-size="10.8" fill="#222222">Turm: kompakter Solitär mit maximaler Höhe — Hochpunkt/Landmarke, die den Boden</text><text x="1064.00" y="657.00" font-size="10.8" fill="#222222">weitgehend freigibt — 5 Geschosse, 14 m Höhe, 1’280 m² GF.</text><text x="1064.00" y="673.00" font-size="10.8" fill="#222222">Lässt anteilig den grössten Freiraum der Parzelle frei, dafür wirkt der Schattenwurf</text><text x="1064.00" y="686.00" font-size="10.8" fill="#222222">punktuell stark (73.3 % Freifläche bei 26.7 % Überbauung).</text><text x="1064.00" y="702.00" font-size="10.8" fill="#222222">Ein zentraler Kern (Treppe/Lift) bedient alle Geschosse — kurze Wege, aber eine einzige</text><text x="1064.00" y="715.00" font-size="10.8" fill="#222222">Vertikalerschliessung.</text><text x="1064.00" y="731.00" font-size="10.8" fill="#222222">Sprengt die zulässige Höhe um 0.8 m, um das Programm zu fassen.</text><line x1="40" y1="1037" x2="1547" y2="1037" stroke="#bbbbbb" stroke-width="1"/><text x="40" y="1049.00" font-size="10.5" fill="#555555">Grenzen der Studie: Extremvarianten sind ein Anstoss, kein Entwurf.</text><text x="40" y="1063.00" font-size="10.5" fill="#555555">Ranking-Gewichte: Programm-Erfüllung (±100%) 30 % · Regelkonformität (passt/Höhenreserve) 25 % · Besonnung (Grenzabstand 3h) 15 % · Freiflächenanteil der Parzelle 15 % · Kompaktheit (Fassade/GF-Proxy) 15 %</text><text x="40" y="1077.00" font-size="10.5" fill="#555555">Gesamt-GF-Vergleich — keine Raumtypen-Zuordnung (Studie)</text></svg>